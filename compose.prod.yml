services:
  app:
    build: ./docker/php
    container_name: "${COMPOSE_PROJECT_NAME}_php"
    depends_on:
      - db
    volumes:
      - ./src:/var/www/html
    environment:
      - APP_NAME=${APP_NAME:-Laravel}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Tokyo}
      - APP_LOCALE=${APP_LOCALE:-ja}
      - APP_FALLBACK_LOCALE=${APP_FALLBACK_LOCALE:-ja}
      - APP_FAKER_LOCALE=${APP_FAKER_LOCALE:-ja_JP}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-database}
      - DB_USERNAME=${DB_USERNAME:-user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - VITE_APP_NAME=${APP_NAME:-Laravel}
    networks:
      - php-nginx-net

  web:
    image: nginx:1.29.0-alpine
    container_name: "${COMPOSE_PROJECT_NAME}_nginx"
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - php-nginx-net

  db:
    image: mysql:9.3
    container_name: "${COMPOSE_PROJECT_NAME}_mysql"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpass}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-database}
      - MYSQL_USER=${MYSQL_USER:-user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-secret}
      - TZ=Asia/Tokyo
    volumes:
      - type: volume
        source: db_data
        target: /var/lib/mysql
    networks:
      - php-nginx-net

  queue:
    build: ./docker/php
    container_name: "${COMPOSE_PROJECT_NAME}_queue"
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./src:/var/www/html
    depends_on:
      - app
      - db
    restart: always
    environment:
      - APP_NAME=${APP_NAME:-Laravel}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Tokyo}
      - APP_LOCALE=${APP_LOCALE:-ja}
      - APP_FALLBACK_LOCALE=${APP_FALLBACK_LOCALE:-ja}
      - APP_FAKER_LOCALE=${APP_FAKER_LOCALE:-ja_JP}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-database}
      - DB_USERNAME=${DB_USERNAME:-user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - VITE_APP_NAME=${APP_NAME:-Laravel}
    networks:
      - php-nginx-net

  scheduler:
    build: ./docker/php
    container_name: "${COMPOSE_PROJECT_NAME}_scheduler"
    command: sh -lc "while :; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - app
      - db
    restart: always
    environment:
      - APP_NAME=${APP_NAME:-Laravel}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Tokyo}
      - APP_LOCALE=${APP_LOCALE:-ja}
      - APP_FALLBACK_LOCALE=${APP_FALLBACK_LOCALE:-ja}
      - APP_FAKER_LOCALE=${APP_FAKER_LOCALE:-ja_JP}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-database}
      - DB_USERNAME=${DB_USERNAME:-user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
    networks:
      - php-nginx-net

networks:
  php-nginx-net:

volumes:
  db_data:
